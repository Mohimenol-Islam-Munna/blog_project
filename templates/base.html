{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Blog</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
    <div class="container header">
        <a href="{% url 'home' %}">Django Blog</a>
        <a href="{% url 'create_post' %}" style="margin-left: 70%;">+ Add Blog</a>
    </div>
    

    <div class="container">
        <div>
            {% block content %}

            {% endblock content %}
        </div>
    </div>

    <section class="container" style="margin-bottom: 40px;">
        {% if user.is_authenticated %}
            <h4>{{ user.username }}</h4>
            <p><a href="{% url 'logout' %}">Log out</a></p>
        {% else %}
            <h4>Please <a href="{% url 'login' %}">Login</a></h4>
            <a href="{% url 'login' %}">Login</a>
        {% endif%}
    </section>
</body>
</html>
