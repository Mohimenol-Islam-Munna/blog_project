{% extends 'base.html' %}


{% block content %}
    <div style="margin: 40px 0px; border: 2px solid sandybrown; padding: 20px;">
        <h2>Sign up</h2>
        <form method="post" style="margin-top: 20px">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" style="margin-top: 10px; padding: 10px 20px; background-color: blueviolet; color: white; font-size: 18px;">Sign Up</button>
        </form>
    </div>
{% endblock content %}
